version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            # Stage the display content into frontend/research so the standalone
            # server can read it at request time (docs-content.ts reads
            # process.cwd()/research, and next.config.ts traces ./research/**).
            # Without this the SSR runtime hits ENOENT on /tmp/app/research → 500.
            - rm -rf ./research && cp -r ../research ./research
            - curl -fsSL https://bun.sh/install | bash
            - export BUN_INSTALL="$HOME/.bun" && export PATH="$BUN_INSTALL/bin:$PATH"
            - bun install --frozen-lockfile
        build:
          commands:
            - export PATH="$HOME/.bun/bin:$PATH"
            - bunx next build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
          # Exclude the build cache: it is only needed to speed up rebuilds
          # (see the `cache` section below) and must not inflate the deploy
          # artifact, which has a hard size limit on Amplify.
          - '!cache/**/*'
      cache:
        paths:
          - 'node_modules/**/*'
          - '.next/cache/**/*'
          - '$HOME/.bun/install/cache/**/*'
