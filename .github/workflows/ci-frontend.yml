name: CI Frontend

on:
  pull_request:
    paths:
      - "frontend/**"
      - "research/**"
      - ".github/workflows/ci-frontend.yml"
    types:
      - opened
      - synchronize
      - ready_for_review
  workflow_dispatch:

# Required for aws-actions/configure-aws-credentials via OIDC.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  # Terraform-managed secret holding { email, password } for the Cognito E2E
  # test user. Read at runtime only — never written to disk or logs.
  E2E_TEST_USER_SECRET_ID: auto_research/dev/e2e-test-user

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # `domains/**` symlinks are a browsing aid only: the viewer derives that
      # view from `runs/` at request time. Verify they still match `runs/` so a
      # stale link does not mislead someone reading the repo.
      - name: Check domains/ view is in sync
        run: dev/sync-domain-links --check

      # Mirror amplify.yml: `-a` keeps symlinks (plain `cp -r` expands every
      # `latest` pointer into a duplicate copy), and the `domains/` links are
      # dropped because the viewer never reads them.
      - name: Copy research content into frontend
        run: |
          cp -a research frontend/research
          find frontend/research/domains -type l -delete

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      # E2E specs assert against a deterministic report; add it to the copied
      # research tree before `next build` so that generateStaticParams sees it.
      - name: Setup E2E fixtures
        working-directory: frontend
        run: node scripts/setup-e2e-fixtures.mjs

      - name: Type check
        working-directory: frontend
        run: bun run type-check

      - name: Lint
        working-directory: frontend
        run: bun run lint

      # Validate the research content itself: markdownlint for broken markup and
      # a mermaid parse pass so no diagram renders as "Syntax error" on the site.
      - name: Check research content (markdown + mermaid)
        working-directory: frontend
        run: bun run check:docs

      - name: Build
        working-directory: frontend
        run: bunx next build
        env:
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ vars.COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_APP_CLIENT_ID: ${{ vars.COGNITO_APP_CLIENT_ID }}

      # ---------------------------------------------------------------------
      # E2E (Playwright)
      # ---------------------------------------------------------------------
      - name: Install Playwright browsers
        working-directory: frontend
        run: bunx playwright install --with-deps chromium

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch Cognito E2E test user credentials
        id: e2e_user
        run: |
          set -euo pipefail
          secret_json=$(aws secretsmanager get-secret-value \
            --secret-id "$E2E_TEST_USER_SECRET_ID" \
            --query SecretString --output text)
          email=$(echo "$secret_json" | jq -r .email)
          password=$(echo "$secret_json" | jq -r .password)
          # Mask immediately so no subsequent step can accidentally print them.
          echo "::add-mask::$email"
          echo "::add-mask::$password"
          echo "email=$email" >> "$GITHUB_OUTPUT"
          echo "password=$password" >> "$GITHUB_OUTPUT"

      - name: Run Playwright
        working-directory: frontend
        env:
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ vars.COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_APP_CLIENT_ID: ${{ vars.COGNITO_APP_CLIENT_ID }}
          E2E_TEST_USER_EMAIL: ${{ steps.e2e_user.outputs.email }}
          E2E_TEST_USER_PASSWORD: ${{ steps.e2e_user.outputs.password }}
        run: bunx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
