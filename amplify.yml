version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            # Stage the display content into frontend/research so the standalone
            # server can read it at request time (docs-content.ts reads
            # process.cwd()/research, and next.config.ts traces ./research/**).
            # Without this the SSR runtime hits ENOENT on /tmp/app/research → 500.
            #
            # `-a` preserves symlinks instead of dereferencing them: plain `cp -r`
            # expands every `runs/**/latest` pointer into a full duplicate copy of
            # the run it targets, inflating the artifact and defeating the
            # realpath-based dedup in lib/content-index.ts.
            #
            # `domains/**` symlinks are excluded because they are a browsing aid
            # only — the viewer derives that view from `runs/` at request time
            # (lib/domain-view.ts). The real files under `domains/` (domain.yaml,
            # README.md) are still read, so they are copied back afterwards.
            - rm -rf ./research && cp -a ../research ./research
            - find ./research/domains -type l -delete
            - curl -fsSL https://bun.sh/install | bash
            - export BUN_INSTALL="$HOME/.bun" && export PATH="$BUN_INSTALL/bin:$PATH"
            - bun install --frozen-lockfile
        build:
          commands:
            - export PATH="$HOME/.bun/bin:$PATH"
            # Amplify injects branch environment variables into the BUILD shell
            # only; the WEB_COMPUTE runtime does not inherit them. NEXT_PUBLIC_*
            # survive because Next.js inlines them into the bundle, but a
            # server-side process.env lookup (NOTES_TABLE_NAME in
            # lib/notes/dynamo.ts) resolves to undefined at request time and
            # every notes call fails with "NOTES_TABLE_NAME is not configured".
            # Writing the value into .env.production before the build makes
            # Next.js bundle it into the standalone server output.
            - echo "NOTES_TABLE_NAME=$NOTES_TABLE_NAME" >> .env.production
            - bunx next build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
          # Exclude the build cache: it is only needed to speed up rebuilds
          # (see the `cache` section below) and must not inflate the deploy
          # artifact, which has a hard size limit on Amplify.
          - '!cache/**/*'
      cache:
        paths:
          - 'node_modules/**/*'
          - '.next/cache/**/*'
          - '$HOME/.bun/install/cache/**/*'
