name: CI Frontend

on:
  pull_request:
    paths:
      - "frontend/**"
      - "docs/**"
      - ".github/workflows/ci-frontend.yml"
    types:
      - opened
      - synchronize
      - ready_for_review
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Copy docs into frontend
        run: cp -r docs frontend/docs

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npx next lint

      - name: Build
        working-directory: frontend
        run: npx next build
